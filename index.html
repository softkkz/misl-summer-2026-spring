<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>Demo Pet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="theme-color" content="#712cf9" />
  </head>
  <body>
      <div class="container">
        <div clsss="row">
          <div class="col-lg-12 mt-3">
            <h2>ทะเบียนสัตว์เลี้ยง</h2><br>
            <button class="btn btn-primary">เพิ่มข้อมูล</button>
          </div>
          <div class="col-lg-12">
            <table class="table table-hover" id="petTable">
              <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">ชื่อ</th>
                  <th scope="col">วันเกิด</th>
                  <th scope="col">ประเภท</th>
                  <th scope="col">เจ้าของ</th>
                </tr>
              </thead>
              <tbody id="petTableBody">
                <tr>
                  <th scope="row">1</th>
                  <td>Mark</td>
                  <td>Otto</td>
                  <td>@mdo</td>
                  <td>@mdo</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>

    <script type="text/javascript">
      const api = axios.create({
        baseURL: "http://localhost:8080/jpa",
        timeout: 5000,
      });

      // LoadPet
      async function loadPets(){
        const response = await api.get('/');
        const petTableBody = document.getElementById('petTableBody');
        const data = response.data;

        if(!data || data.length === 0){
          petTableBody.innerHTML = '<tr><td colspan="5" class="text-center"> ไม่มีข้อมูลสัตว์เลี้ยง</td></tr>';
        } else {
          petTableBody.innerHTML = '';
          data.forEach(pet => {
            const row = `<tr>
              <th scope="row">${pet.id}</th>
              <td>${pet.name}</td>
              <td>${pet.birthDate}</td>
              <td>${pet.category}</td>
              <td>${pet.owner.ownerName}</td>
            </tr>`;
            petTableBody.innerHTML += row;
          });
        }

      }


      loadPets();
    </script>

  </body>
</html>
